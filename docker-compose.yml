version: "3.9"

services:
  stk_chart_analyze:
    build:
      context: .            # 关键点：. 指的就是 yml 所在目录
      dockerfile: Dockerfile
    container_name: stk_chart_analyze
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      - TZ=Asia/Shanghai
    networks:
      - streamlit-net

networks:
  streamlit-net:
    driver: bridge